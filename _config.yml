# Dependencies
markdown:         redcarpet
redcarpet:
  extensions: ["tables"]

highlighter:      pygments

# Permalinks
permalink:        pretty

# Setup
title:            Psidium
tagline:          'Apple, iOS, tech, science, physics, image recognition, front-end'
url:              http://psidium.github.io
shorturl:         psidium.github.io

author:
  name:           'Gabriel Borges'
  url:            https://twitter.com/PsidiumEn

paginate:         1

# Custom vars
version:          1.0.0

github:
  repo:           github.com/psidium/psidium.github.io

# This is the list of pages to include in the header of the website.
pages_list:       
  About: '/about/'
  Archive: '/archive/'
  Feed: '/atom.xml'

# Allow URL Redirects: 
#  * https://help.github.com/articles/redirects-on-github-pages
gems:
  - jekyll-redirect-from
  - jekyll-paginate
